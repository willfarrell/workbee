<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <title>workbee</title>
  </head>
  <body>
    <h1>ServiceWorker</h1>

    <script type="module">
      if ('serviceWorker' in navigator) {
              const sw = navigator.serviceWorker
              await sw.register('/sw.js', {
                type: 'module',
                scope: '/'
              })

              // Handlers for messages the ServiceWorker posts back to the page.
              const swEvents = {
                'offline-enqueue': (data) =>
                  console.log('queued while offline', data),
                'offline-dequeue': (data) =>
                  console.log('replayed queued request', data),
                inactive: () => console.log('session inactive')
              }
              sw.addEventListener('message', (event) => {
                if (event.origin !== location.origin) return
                swEvents[event.data?.type]?.(event.data)
              })
            }

            document.addEventListener('visibilitychange', () => {
              console.log(document.visibilityState) // for session timeout
            })

            // UI
            const addButton = (type, name) => {
              const button = document.createElement('button')
              button.innerText = name
              button.addEventListener('click', () => {
                const path = `${type}/${name}`
                const options = { method: 'GET', headers: {} }
                // if (name === 'strategyLocalDownload') {
                //   path += '/download.json'
                //   options.method = 'POST'
                //   options.headers['Content-Type'] = 'application/json'
                //   options.body = '[1,2,3,4,5]'
                // }
                if (name === 'offlineMiddleware') {
                  options.method = 'POST'
                }
                if (name === 'saveDataMiddleware') {
                  options.headers['Save-Data'] = 'on'
                }
                console.log(`fetch('${path}',`, options, ')')
                fetch(
                  new Request(path, {
                    ...options,
                    headers: new Headers(options.headers)
                  })
                )
                  .then((response) => response.text())
                  .catch((e) => e.message)
                  .then((text) =>
                    console.log(`fetch('${path}',`, options, ') =>', text)
                  )
              })
              document.body.appendChild(button)
            }
            const strategies = [
              'strategyNetworkOnly',
              'strategyCacheOnly',
              'strategyNetworkFirst',
              'strategyCacheFirst',
              'strategyStaleWhileRevalidate',
              'strategyStaleIfError',
              'strategyIgnore',
              'strategyCacheFirstIgnore',
              //'strategyLocalDownload',
              'strategyHTMLPartition',
              'strategyPartition'
            ]
            for (const strategy of strategies) {
              addButton('strategy', strategy)
            }

            const middlewares = [
              'cacheControlMiddleware',
              'fallbackMiddleware',
              'offlineMiddleware',
              'saveDataMiddleware'
            ]
            for (const middleware of middlewares) {
              addButton('middleware', middleware)
            }
            //addButton('https://example.org', 'External')
    </script>
  </body>
</html>
