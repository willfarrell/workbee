name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'package.json'

env:
  NODE_VERSION: 24.x

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    if: ${{ github.event.pull_request.merged && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # actions/attest-build-provenance
      attestations: write # actions/attest-build-provenance
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-telemetry: true
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - name: Set env
        run: |
          tag=$(npm pkg get version | xargs)
          echo "tag=${tag}" >> "$GITHUB_ENV"
          echo "prerelease=$([ "${tag##*-*}" ] && echo false || echo true)" >> "$GITHUB_ENV"
          # Only release/publish when the merged root version actually changed.
          # Check EVERY public package against the registry (not just core) so a
          # re-run after a partial publish still proceeds to ship the laggards.
          # Discover public packages from packages/* (deps aren't installed yet, so
          # read package.json directly) — a new package is picked up automatically.
          changed=false
          while IFS= read -r name; do
            published=$(npm view "${name}" version 2>/dev/null || echo "")
            [ "${tag}" != "${published}" ] && changed=true
          done < <(node -e 'const fs=require("node:fs"); for (const d of fs.readdirSync("packages")) { const p="packages/"+d+"/package.json"; if (fs.existsSync(p)) { const j=JSON.parse(fs.readFileSync(p,"utf8")); if (!j.private && j.name) console.log(j.name); } }')
          echo "changed=${changed}" >> "$GITHUB_ENV"
      - name: Install dependencies
        if: ${{ env.changed == 'true' }}
        run: |
          npm ci --ignore-scripts
      - name: Verify dependency signatures
        if: ${{ env.changed == 'true' }}
        run: |
          npm audit signatures
      - name: Pack
        id: pack
        if: ${{ env.changed == 'true' }}
        run: |
          # Pack only public workspaces. `npm pack --workspaces` would also pack the
          # private websites/* and .github workspaces, risking their publication.
          mapfile -t args < <(
            npm query '.workspace' | node -e 'for (const w of JSON.parse(require("node:fs").readFileSync(0, "utf8"))) if (!w.private) { console.log("--workspace"); console.log(w.location) }'
          )
          {
            echo "packages<<EOF"
            npm pack "${args[@]}" --json
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Build Attestations
        if: ${{ env.changed == 'true' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            **/*.tgz
      - name: Upload artifact
        if: ${{ env.changed == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.tag }}
          path: |
            *.tgz
    outputs:
      tag: ${{ env.tag }}
      prerelease: ${{ env.prerelease }}
      changed: ${{ env.changed }}

  release:
    name: Release
    needs: build
    if: ${{ needs.build.outputs.changed == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write # softprops/action-gh-release
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-telemetry: true
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning] no cache configured (no `cache:` input); reconsider if caching is added
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: ${{ needs.build.outputs.tag }}
      - name: Release
        # Replaces actions/create-release & actions/upload-release-asset (deprecated)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 # zizmor: ignore[superfluous-actions] prefer maintained action over inline `gh release` script
        with:
          draft: true
          prerelease: ${{ needs.build.outputs.prerelease }}
          tag_name: ${{ needs.build.outputs.tag }}
          generate_release_notes: true
    outputs:
      tag: ${{ needs.build.outputs.tag }}
      prerelease: ${{ needs.build.outputs.prerelease }}
      changed: ${{ needs.build.outputs.changed }}

  publish:
    name: Publish
    needs: release
    if: ${{ needs.release.outputs.changed == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # npm publish
      attestations: read # gh attestation verify
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-telemetry: true
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: ${{ needs.release.outputs.tag }}
      - name: Verify build provenance attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Loop (not find -exec) so a failed verification propagates a non-zero exit.
          for f in *.tgz; do
            echo "${f}"
            gh attestation verify "${f}" --repo "${{ github.repository }}" || exit 1
          done
      - name: npm publish (next)
        if: ${{ needs.release.outputs.prerelease == 'true' }}
        # NODE_AUTH_TOKEN is a documented fallback: trusted publishing (OIDC) is the
        # primary path, but if it isn't configured npm would otherwise silently no-op.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Fault-tolerant: publish each tarball, skip versions already published,
          # fail only on a real error so a partial release can be safely re-run.
          status=0
          for f in *.tgz; do
            if out=$(npm publish --tag next --provenance --access public "$f" 2>&1); then
              echo "published: $f"
            elif printf '%s\n' "$out" | grep -qiE 'cannot publish over|previously published|EPUBLISHCONFLICT'; then
              echo "skip (already published): $f"
            else
              printf '%s\n' "$out" >&2
              echo "FAILED: $f" >&2
              status=1
            fi
          done
          exit $status
      - name: npm publish (latest)
        if: ${{ needs.release.outputs.prerelease == 'false' }}
        # NODE_AUTH_TOKEN is a documented fallback: trusted publishing (OIDC) is the
        # primary path, but if it isn't configured npm would otherwise silently no-op.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Fault-tolerant: publish each tarball, skip versions already published,
          # fail only on a real error so a partial release can be safely re-run.
          status=0
          for f in *.tgz; do
            if out=$(npm publish --tag latest --provenance --access public "$f" 2>&1); then
              echo "published: $f"
            elif printf '%s\n' "$out" | grep -qiE 'cannot publish over|previously published|EPUBLISHCONFLICT'; then
              echo "skip (already published): $f"
            else
              printf '%s\n' "$out" >&2
              echo "FAILED: $f" >&2
              status=1
            fi
          done
          exit $status
